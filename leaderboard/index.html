  <style>
    .sub-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    /* .sub-pills, .pill, .board-meta and .you now live in /assets/site.css,
       because the game pages mount the same widget. */
    .board-panel { margin-top: 24px; }
    .tools { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 32px; }
    .tools .note { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

<body>
<nav class="site-nav" aria-label="Main">
  <div class="container">
    <a class="wordmark" href="/">maybaah<span class="tld">.github.io</span></a>
    <div class="nav-links">
      <a href="/arcade/">Arcade</a>
      <a href="/leaderboard/" aria-current="page">Leaderboard</a>
      <a href="/#contact">Contact</a>
      <a href="https://github.com/Maybaah" rel="me">GitHub&nbsp;↗</a>
    </div>
  </div>
</nav>

<main>
  <header class="section container" style="padding-top: 72px; padding-bottom: 0;">
    <h1 class="fade-up" style="--d:0;">Leaderboards</h1>
  </header>

  <section class="section container">
    <div class="tabs" role="tablist" aria-label="Game">
      <button class="tab" role="tab" id="tab-wordle" aria-selected="true">Wordle</button>
      <button class="tab" role="tab" id="tab-minesweeper" aria-selected="false">Minesweeper</button>
      <button class="tab" role="tab" id="tab-2048" aria-selected="false">2048</button>
      <button class="tab" role="tab" id="tab-snake" aria-selected="false">Snake</button>
      <button class="tab" role="tab" id="tab-flowcode" aria-selected="false">flowcode</button>
    </div>

    <!-- Pills, meta and table are all built by Arcade.mountBoard from the one
         board description in /assets/arcade.js, which the game pages mount too. -->
    <div class="board-panel" id="panel-wordle" role="tabpanel"></div>
    <div class="board-panel" id="panel-minesweeper" role="tabpanel" hidden></div>
    <div class="board-panel" id="panel-2048" role="tabpanel" hidden></div>
    <div class="board-panel" id="panel-snake" role="tabpanel" hidden></div>
    <div class="board-panel" id="panel-flowcode" role="tabpanel" hidden></div>

    <div style="margin-top: 20px;">
      <a class="btn btn-secondary btn-sm" href="/flowcode/" id="open-flowcode" hidden>Open flowcode</a>
    </div>

    <div class="tools">
      <span class="note" id="tools-note">every board lives in one verified database · daily boards reset at midnight UTC</span>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <span>© 2026 Artem Kovtoniuk</span>
    <div class="links">
      <a href="/">home</a>
      <a href="/arcade/">arcade</a>
      <a href="https://github.com/Maybaah/Maybaah.github.io">source</a>
    </div>
  </div>
</footer>

<script src="/assets/arcade.js"></script>
<script>
  (function () {
    "use strict";

    /* Each panel is a board mounted from the shared description in
       /assets/arcade.js. The page owns the tabs; the widget owns everything
       inside a panel, including its own pills. */
    var tabs = ["wordle", "minesweeper", "2048", "snake", "flowcode"];
    var openFlowcode = document.getElementById("open-flowcode");

    tabs.forEach(function (name) {
      Arcade.mountBoard(document.getElementById("panel-" + name), { game: name });
    });

    tabs.forEach(function (name) {
      document.getElementById("tab-" + name).addEventListener("click", function () {
        tabs.forEach(function (other) {
          document.getElementById("tab-" + other).setAttribute("aria-selected", String(other === name));
          document.getElementById("panel-" + other).hidden = other !== name;
        });
        openFlowcode.hidden = name !== "flowcode";
      });
    });
  })();
</script>
</body>
</html>
